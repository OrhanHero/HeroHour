name: Technical Debt
description: Report technical debt or refactoring needs
title: "[Tech Debt] "
labels: ["tech-debt", "refactor"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Technical debt slows us down. Help us track and prioritize it!

  - type: input
    id: title
    attributes:
      label: Title
      placeholder: "e.g., F# CombatResolver has 500+ line function needing decomposition"
    validations:
      required: true

  - type: textarea
    id: location
    attributes:
      label: Location
      description: Files, modules, or systems affected
      placeholder: |
        Source/HeroHourSimulation/src/Combat/CombatResolver.fs
        Source/HeroHour/Private/Combat/CombatSystem.cpp
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is the debt? Why was it introduced?
      placeholder: "CombatResolver.ResolveEngagement() grew organically and now handles targeting, damage, effects, and networking..."

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: How does this affect development?
      placeholder: |
        - Hard to test (80% of combat bugs trace here)
        - New damage types require modifying 5+ functions
        - Onboarding takes 2 weeks to understand
        - Performance: 2ms/frame in large battles

  - type: textarea
    id: proposed
    attributes:
      label: Proposed Solution
      description: How would you fix it?
      placeholder: "Extract IDamageCalculator, ITargetSelector, IEffectApplier interfaces..."

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical (blocks features, causes bugs)
        - High (slows development significantly)
        - Medium (annoying but manageable)
        - Low (nice to clean up)
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: Estimated Effort
      options:
        - Small (< 1 day)
        - Medium (1-3 days)
        - Large (1-2 weeks)
        - Epic (2+ weeks)
    validations:
      required: true

  - type: checkboxes
    id: risks
    attributes:
      label: Risks
      options:
        - label: "Breaking changes to public API"
        - label: "Requires coordination across teams"
        - label: "Performance regression risk"
        - label: "Save game compatibility"
        - label: "Multiplayer desync risk"