; HeroHour - Default Engine Configuration
; UE5.8 + EOS Integration Configuration
;
; IMPORTANT: Never commit Client Secret or Encryption Key to version control!
; Use environment variables or local .ini files (see DefaultEngine.Local.ini.template)

[/Script/Engine.GameEngine]
+NetDriverDefinitions=(DefName="GameNetDriver",DriverClassName="OnlineSubsystemEOS.EOSENetDriver",DriverClassNameFallback="OnlineSubsystemUtils.IpNetDriver")

[OnlineSubsystem]
DefaultPlatformService=EOS
bHasVoiceEnabled=false

[OnlineSubsystemEOS]
bEnabled=true
; Product settings - replace with your actual values from Epic Dev Portal
; Organization: HERO (hero-c31fffa8)
; Product: HERO HOUR (9069f4f0eda147c9a341ea081b5e9803)
ProductId=9069f4f0eda147c9a341ea081b5e9803
SandboxId=hero-hour-dev
DeploymentId=hero-hour-dev
ClientId=xyza7891HEROGameClient
; ClientSecret is set via environment variable EOS_CLIENT_SECRET or in DefaultEngine.Local.ini
; EncryptionKey is set via environment variable EOS_ENCRYPTION_KEY or in DefaultEngine.Local.ini
bIsServer=false
bUseEAS=false
bUseEOSConnect=true
bUseEOSFriends=true
bUseEOSPresence=true
bUseEOSSessions=true
bUseEOSLobbies=true
bUseEOSMatchmaking=true
bUseEOSLeaderboards=true
bUseEOSAchievements=true
bUseEOSStats=true
bUseEOSFileTransfer=false
bUseEOSVoice=false
bUseEOSEcom=false
bUseEOSPlayerDataStorage=true
bUseEOSTitleStorage=false
bUseEOSSanctions=false
bUseEOSAntiCheat=false
; Overlay settings
bEnableOverlay=true
bEnableSocialOverlay=true
; Cache directory
CacheDir=EOSCache
; Tick budget (ms)
TickBudget=0
; Logging
LogLevel=Log
bEnableLogging=true

[OnlineSubsystemEOS.Editor]
bEnabled=true
ProductId=9069f4f0eda147c9a341ea081b5e9803
SandboxId=hero-hour-dev
DeploymentId=hero-hour-dev
ClientId=xyza7891HEROGameClientEditor

[/Script/OnlineSubsystemEOS.EOSNetDriver]
NetConnectionClassName="OnlineSubsystemEOS.EOSNetConnection"
NetDriverClassName="OnlineSubsystemEOS.EOSNetDriver"
MaxPortCountToTry=100

[/Script/OnlineSubsystemEOS.EOSNetConnection]
PacketTimeout=60.0

[/Script/Engine.RendererSettings]
r.DefaultFeature.AntiAliasing=2
r.DefaultFeature.MotionBlur=0
r.DefaultFeature.AmbientOcclusion=1
r.DefaultFeature.AmbientOcclusionStaticFraction=1

[/Script/Engine.GameNetworkManager]
TotalNetBandwidth=32768
BadPacketLossThreshold=0.8
SeverePacketLossThreshold=0.9
MinDynamicBandwidth=4096
MaxDynamicBandwidth=32768
MaxInternetClientRate=20000
MaxClientRate=20000

[/Script/OnlineSubsystemUtils.IpNetDriver]
MaxInternetClientRate=20000
MaxClientRate=20000
NetConnectionClassName="OnlineSubsystemUtils.IpNetConnection"

[/Script/Engine.PlayerController]
NetPlayerTickRate=60

[/Script/Engine.WorldSettings]
bEnableWorldBoundsChecks=true

[/Script/UnrealEd.ProjectPackagingSettings]
BuildConfiguration=Shipping
ForDistribution=true
IncludePrerequisites=true
UsePakFile=true
GenerateChunks=true
PakFileCompressionLevel=5

[/Script/OnlineSubsystemEOS.EOSSettings]
; Title Storage settings
TitleStorageReadChunkSize=1024
TitleStorageWriteChunkSize=1024

[/Script/Engine.InputSettings]
bEnableMouseSmoothing=False
bEnableFOVScaling=False
DefaultViewportMouseCaptureMode=CapturePermanently_IncludingInitialMouseDown
DefaultViewportMouseLockMode=LockOnCapture

[/Script/Engine.Console]
; EOS Console Commands
; eos.auth.login - Login with EOS
; eos.auth.logout - Logout from EOS
; eos.connect.login - Login with EOS Connect
; eos.friends.query - Query friends list
; eos.presence.set - Set presence
; eos.lobbies.create - Create lobby
; eos.lobbies.join - Join lobby
; eos.matchmaking.search - Search matchmaking